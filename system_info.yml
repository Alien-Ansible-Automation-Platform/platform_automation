---
- name: Get system info (CPU, Memory, Disk)
  hosts: all
  become: yes
  gather_facts: yes
  tasks:
    - name: Ensure we are targeting correct host
      debug:
        msg: "Running on {{ inventory_hostname }} (Expected: {{ target_host }} - {{ target_ip }})"

    - name: Show CPU Info
      debug:
        msg: >
          Host: {{ inventory_hostname }}
          CPU Cores: {{ ansible_facts.processor_vcpus }}
          Architecture: {{ ansible_facts.architecture }}

    - name: Show Memory Info
      debug:
        msg: >
          Total Memory: {{ ansible_facts.memtotal_mb }} MB
          Free Memory: {{ ansible_facts.memfree_mb }} MB

    - name: Show Disk Partitions
      debug:
        msg: >
          Partitions: {{ ansible_facts.mounts }}
