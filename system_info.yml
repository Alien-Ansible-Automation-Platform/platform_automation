---
- name: Get system info (CPU, Memory, Disk)
  hosts: all
  gather_facts: yes
  become: yes

  tasks:

    - name: Show host identity
      debug:
        msg: "Running on {{ inventory_hostname }} (IP: {{ ansible_host | default('N/A') }})"

    - name: CPU information
      debug:
        msg:
          - "CPU Cores: {{ ansible_facts.processor_vcpus }}"
          - "Architecture: {{ ansible_facts.architecture }}"

    - name: Memory information
      debug:
        msg:
          - "Total Memory: {{ ansible_facts.memtotal_mb }} MB"
          - "Free Memory: {{ ansible_facts.memfree_mb }} MB"

    - name: Disk / Mount information
      debug:
        msg: "{{ ansible_facts.mounts }}"
